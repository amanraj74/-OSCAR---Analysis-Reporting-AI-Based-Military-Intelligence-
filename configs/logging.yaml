version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

  json:
    format: "%(asctime)s %(levelname)s %(name)s %(message)s"
    class: pythonjsonlogger.jsonlogger.JsonFormatter

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout

  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: json
    filename: logs/oscar.log
    maxBytes: 10485760
    backupCount: 5
    encoding: utf-8

loggers:
  oscar:
    level: DEBUG
    handlers: [console, file]
    propagate: false

  src:
    level: DEBUG
    handlers: [console, file]
    propagate: false

  urllib3:
    level: WARNING
    handlers: [console]
    propagate: false

  transformers:
    level: WARNING
    handlers: [console]
    propagate: false

  streamlit:
    level: INFO
    handlers: [console]
    propagate: false

root:
  level: INFO
  handlers: [console]

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install runtime + lint deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black==24.4.2 isort==5.13.2 ruff==0.5.4 bandit==1.7.9

      - name: ruff
        run: ruff check src tests

      - name: black --check
        run: black --check src tests

      - name: isort --check
        run: isort --check-only src tests

      - name: bandit
        run: bandit -r src -c pyproject.toml

  test:
    name: Test (${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        env:
          NEWS_API_KEY: dummy-news-key-for-ci
          APP_ENV: ci
          LOG_LEVEL: WARNING
        run: pytest -m "not integration and not e2e and not slow" --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install detect-secrets
        run: pip install detect-secrets==1.5.0

      - name: Scan for secrets
        run: |
          if [ ! -f .secrets.baseline ]; then
            detect-secrets scan --exclude-files '\.lock$' > .secrets.baseline
          fi
          detect-secrets scan --exclude-files '\.lock$' --baseline .secrets.baseline
